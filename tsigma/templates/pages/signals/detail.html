{% extends "base.html" %}
{% block title %}Signal {{ signal_id }} - TSIGMA{% endblock %}

{% block content %}
<div x-data="{
  signal: null,
  approaches: [],
  expandedApproach: null,
  detectors: {},
  loading: true,
  reports: [],
  reportDropdown: false,

  async init() {
    const signalId = '{{ signal_id }}';
    await Promise.all([
      this.fetchSignal(signalId),
      this.fetchReports()
    ]);
    this.loading = false;
  },

  async fetchSignal(signalId) {
    try {
      const res = await fetch('/api/v1/signals/' + signalId, { credentials: 'same-origin' });
      if (res.ok) {
        const data = await res.json();
        this.signal = data;
        this.approaches = data.approaches || [];
      }
    } catch (e) { console.error('Failed to fetch signal:', e); }
  },

  async fetchReports() {
    try {
      const res = await fetch('/api/v1/reports', { credentials: 'same-origin' });
      if (res.ok) this.reports = await res.json();
    } catch (e) {}
  },

  async toggleApproach(approachId) {
    if (this.expandedApproach === approachId) {
      this.expandedApproach = null;
      return;
    }
    this.expandedApproach = approachId;
    if (!this.detectors[approachId]) {
      try {
        const res = await fetch('/api/v1/detectors/' + approachId, { credentials: 'same-origin' });
        if (res.ok) this.detectors[approachId] = await res.json();
      } catch (e) { this.detectors[approachId] = []; }
    }
  },

  initMap() {
    if (!this.signal || !this.signal.latitude || !this.signal.longitude) return;
    const lat = parseFloat(this.signal.latitude);
    const lng = parseFloat(this.signal.longitude);

    const map = new maplibregl.Map({
      container: 'signal-map',
      style: { version: 8, sources: {
        'osm-tiles': { type: 'raster', tiles: ['https://tile.openstreetmap.org/{z}/{x}/{y}.png'], tileSize: 256, attribution: '&copy; OpenStreetMap contributors' }
      }, layers: [{ id: 'osm', type: 'raster', source: 'osm-tiles' }] },
      center: [lng, lat],
      zoom: 15
    });

    map.on('load', () => {
      new maplibregl.Marker({ color: '#3b82f6' }).setLngLat([lng, lat]).addTo(map);
    });
  }
}" x-effect="if (signal && signal.latitude) $nextTick(() => initMap())">

  <!-- Loading -->
  <template x-if="loading">
    <div class="animate-pulse space-y-4">
      <div class="h-8 bg-gray-700 rounded w-1/3"></div>
      <div class="h-4 bg-gray-700 rounded w-1/2"></div>
      <div class="h-64 bg-gray-700 rounded"></div>
    </div>
  </template>

  <template x-if="!loading && signal">
    <div>
      <!-- Header -->
      <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3 mb-6">
        <div>
          <div class="flex items-center gap-3">
            <a href="/signals" class="text-gray-400 hover:text-white">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
              </svg>
            </a>
            <h1 class="text-xl font-bold text-white" x-text="signal.signal_id"></h1>
            <span x-show="signal.enabled"
                  class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-green-900 text-green-300">
              Enabled
            </span>
            <span x-show="!signal.enabled"
                  class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-red-900 text-red-300">
              Disabled
            </span>
          </div>
          <p class="text-sm text-gray-400 mt-1">
            <span x-text="signal.primary_street"></span>
            <span x-show="signal.secondary_street"> &amp; <span x-text="signal.secondary_street"></span></span>
          </p>
        </div>

        <!-- Run Report dropdown -->
        <div class="relative" x-data="{ open: false }">
          <button @click="open = !open"
                  class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium rounded-md transition-colors flex items-center gap-2">
            Run Report
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
            </svg>
          </button>
          <div x-show="open" @click.away="open = false" x-transition
               class="absolute right-0 mt-2 w-56 bg-gray-800 border border-gray-700 rounded-md shadow-lg py-1 z-10">
            <template x-for="r in reports" :key="r.name || r.report_name">
              <a :href="'/reports/' + (r.name || r.report_name) + '?signal_id=' + signal.signal_id"
                 class="block px-4 py-2 text-sm text-gray-300 hover:bg-gray-700 hover:text-white"
                 x-text="r.display_name || r.name || r.report_name"></a>
            </template>
            <p x-show="reports.length === 0" class="px-4 py-2 text-sm text-gray-500">No reports available</p>
          </div>
        </div>
      </div>

      <!-- Info + Map grid -->
      <div class="grid grid-cols-1 lg:grid-cols-2 gap-4 mb-6">
        <!-- Info card -->
        <div class="bg-gray-800 border border-gray-700 rounded-lg p-5">
          <h2 class="text-sm font-semibold text-gray-300 mb-4">Signal Information</h2>
          <dl class="grid grid-cols-2 gap-x-4 gap-y-3 text-sm">
            <div>
              <dt class="text-gray-500">Latitude</dt>
              <dd class="text-white" x-text="signal.latitude || '---'"></dd>
            </div>
            <div>
              <dt class="text-gray-500">Longitude</dt>
              <dd class="text-white" x-text="signal.longitude || '---'"></dd>
            </div>
            <div>
              <dt class="text-gray-500">Region</dt>
              <dd class="text-white" x-text="signal.region_id || '---'"></dd>
            </div>
            <div>
              <dt class="text-gray-500">Jurisdiction</dt>
              <dd class="text-white" x-text="signal.jurisdiction_id || '---'"></dd>
            </div>
            <div class="col-span-2">
              <dt class="text-gray-500">Note</dt>
              <dd class="text-white" x-text="signal.note || 'No notes'"></dd>
            </div>
          </dl>
        </div>

        <!-- Map -->
        <div class="bg-gray-800 border border-gray-700 rounded-lg p-4">
          <h2 class="text-sm font-semibold text-gray-300 mb-3">Location</h2>
          <div id="signal-map" class="w-full h-64 rounded-md overflow-hidden"
               x-show="signal.latitude && signal.longitude"></div>
          <p x-show="!signal.latitude || !signal.longitude" class="text-sm text-gray-500 py-8 text-center">
            No coordinates available
          </p>
        </div>
      </div>

      <!-- Approaches -->
      <div class="bg-gray-800 border border-gray-700 rounded-lg overflow-hidden">
        <div class="px-5 py-4 border-b border-gray-700">
          <h2 class="text-sm font-semibold text-gray-300">
            Approaches
            <span class="text-gray-500 font-normal" x-text="'(' + approaches.length + ')'"></span>
          </h2>
        </div>

        <template x-if="approaches.length === 0">
          <p class="text-sm text-gray-500 text-center py-8">No approaches configured</p>
        </template>

        <div class="divide-y divide-gray-700">
          <template x-for="a in approaches" :key="a.approach_id">
            <div>
              <!-- Approach row -->
              <button @click="toggleApproach(a.approach_id)"
                      class="w-full flex items-center justify-between px-5 py-3 text-sm hover:bg-gray-750 transition-colors text-left">
                <div class="flex items-center gap-4">
                  <span class="text-white font-medium" x-text="a.description || 'Approach ' + a.direction_type_id"></span>
                  <span class="text-gray-500">Phase <span x-text="a.protected_phase_number || '---'"></span></span>
                  <span class="text-gray-500" x-show="a.permissive_phase_number">Perm <span x-text="a.permissive_phase_number"></span></span>
                  <span class="text-gray-500" x-show="a.ped_phase_number">Ped <span x-text="a.ped_phase_number"></span></span>
                  <span class="text-gray-500" x-show="a.mph"><span x-text="a.mph"></span> mph</span>
                </div>
                <svg class="w-4 h-4 text-gray-500 transition-transform" :class="expandedApproach === a.approach_id && 'rotate-180'"
                     fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
                </svg>
              </button>

              <!-- Detectors -->
              <div x-show="expandedApproach === a.approach_id" x-transition class="bg-gray-900/50 px-5 py-3">
                <template x-if="detectors[a.approach_id] && detectors[a.approach_id].length > 0">
                  <table class="w-full text-sm">
                    <thead>
                      <tr class="text-gray-500 text-xs uppercase">
                        <th class="text-left py-1 pr-4">Channel</th>
                        <th class="text-left py-1 pr-4">Distance (ft)</th>
                        <th class="text-left py-1 pr-4">Lane #</th>
                      </tr>
                    </thead>
                    <tbody>
                      <template x-for="d in detectors[a.approach_id]" :key="d.detector_id">
                        <tr class="text-gray-300">
                          <td class="py-1 pr-4" x-text="d.detector_channel"></td>
                          <td class="py-1 pr-4" x-text="d.distance_from_stop_bar || '---'"></td>
                          <td class="py-1 pr-4" x-text="d.lane_number || '---'"></td>
                        </tr>
                      </template>
                    </tbody>
                  </table>
                </template>
                <p x-show="!detectors[a.approach_id] || detectors[a.approach_id].length === 0"
                   class="text-xs text-gray-500">No detectors configured</p>
              </div>
            </div>
          </template>
        </div>
      </div>

    </div>
  </template>

  <!-- Not found -->
  <template x-if="!loading && !signal">
    <div class="text-center py-12">
      <p class="text-gray-400">Signal not found.</p>
      <a href="/signals" class="text-blue-400 hover:text-blue-300 text-sm mt-2 inline-block">Back to signals</a>
    </div>
  </template>

</div>
{% endblock %}
