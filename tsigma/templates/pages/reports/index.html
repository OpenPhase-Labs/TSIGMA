{% extends "base.html" %}
{% block title %}Reports - TSIGMA{% endblock %}

{% block content %}
<div x-data="{
  reports: [],
  loading: true,

  async init() {
    try {
      const res = await fetch('/api/v1/reports', { credentials: 'same-origin' });
      if (res.ok) this.reports = await res.json();
    } catch (e) { console.error('Failed to fetch reports:', e); }
    this.loading = false;
  },

  grouped() {
    const groups = {};
    for (const r of this.reports) {
      const cat = r.category || 'standard';
      if (!groups[cat]) groups[cat] = [];
      groups[cat].push(r);
    }
    return groups;
  },

  categoryLabel(cat) {
    const labels = {
      'dashboard': 'Dashboard Reports',
      'standard': 'Standard Reports',
      'detailed': 'Detailed Reports'
    };
    return labels[cat] || cat.charAt(0).toUpperCase() + cat.slice(1) + ' Reports';
  },

  categoryOrder() {
    const order = ['dashboard', 'standard', 'detailed'];
    const keys = Object.keys(this.grouped());
    keys.sort((a, b) => {
      const ai = order.indexOf(a);
      const bi = order.indexOf(b);
      if (ai === -1 && bi === -1) return a.localeCompare(b);
      if (ai === -1) return 1;
      if (bi === -1) return -1;
      return ai - bi;
    });
    return keys;
  }
}">

  <div class="mb-6">
    <h1 class="text-xl font-bold text-white">Reports</h1>
    <p class="text-sm text-gray-400 mt-1">Select a report to configure and run.</p>
  </div>

  <!-- Loading -->
  <template x-if="loading">
    <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
      <template x-for="i in 6">
        <div class="bg-gray-800 border border-gray-700 rounded-lg p-5 animate-pulse">
          <div class="h-5 bg-gray-700 rounded w-2/3 mb-3"></div>
          <div class="h-3 bg-gray-700 rounded w-full mb-2"></div>
          <div class="h-3 bg-gray-700 rounded w-3/4"></div>
        </div>
      </template>
    </div>
  </template>

  <!-- Reports grouped by category -->
  <template x-if="!loading">
    <div class="space-y-8">
      <template x-for="cat in categoryOrder()" :key="cat">
        <div>
          <h2 class="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-3" x-text="categoryLabel(cat)"></h2>
          <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
            <template x-for="r in grouped()[cat]" :key="r.name || r.report_name">
              <a :href="'/reports/' + (r.name || r.report_name)"
                 class="block bg-gray-800 border border-gray-700 rounded-lg p-5 hover:border-blue-500 transition-colors group">
                <h3 class="text-sm font-semibold text-white group-hover:text-blue-400 transition-colors"
                    x-text="r.display_name || r.name || r.report_name"></h3>
                <p class="text-xs text-gray-400 mt-2 line-clamp-2" x-text="r.description || 'No description available'"></p>
                <div class="flex items-center gap-2 mt-3">
                  <span x-show="r.estimated_time"
                        class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-gray-700 text-gray-300"
                        x-text="r.estimated_time"></span>
                  <template x-for="fmt in (r.export_formats || [])" :key="fmt">
                    <span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-blue-900/50 text-blue-300"
                          x-text="fmt.toUpperCase()"></span>
                  </template>
                </div>
              </a>
            </template>
          </div>
        </div>
      </template>

      <!-- Empty state -->
      <div x-show="reports.length === 0" class="text-center py-12">
        <p class="text-gray-500">No reports available.</p>
      </div>
    </div>
  </template>

</div>
{% endblock %}
