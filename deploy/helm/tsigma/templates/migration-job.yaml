{{- if .Values.migration.enabled -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "tsigma.fullname" . }}-migrate-{{ .Release.Revision }}
  labels:
    {{- include "tsigma.labels" . | nindent 4 }}
    app.kubernetes.io/component: migration
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: {{ .Values.migration.backoffLimit }}
  ttlSecondsAfterFinished: {{ .Values.migration.ttlSecondsAfterFinished }}
  template:
    metadata:
      labels:
        {{- include "tsigma.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: migration
    spec:
      restartPolicy: OnFailure
      serviceAccountName: {{ include "tsigma.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: migrate
          image: {{ include "tsigma.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          command: ["alembic", "upgrade", "head"]
          envFrom:
            - configMapRef:
                name: {{ include "tsigma.fullname" . }}-config
            - secretRef:
                name: {{ include "tsigma.dbSecretName" . }}
          {{- if and .Values.database.ssl.enabled .Values.database.ssl.caCertSecret }}
          volumeMounts:
            - name: db-tls
              mountPath: /etc/tsigma/db-tls
              readOnly: true
          {{- end }}
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      {{- if and .Values.database.ssl.enabled .Values.database.ssl.caCertSecret }}
      volumes:
        - name: db-tls
          secret:
            secretName: {{ .Values.database.ssl.caCertSecret }}
            items:
              - key: ca.crt
                path: ca.crt
      {{- end }}
{{- end }}
