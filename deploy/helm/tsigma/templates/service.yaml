apiVersion: v1
kind: Service
metadata:
  name: {{ include "tsigma.fullname" . }}
  labels:
    {{- include "tsigma.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: http
      port: {{ .Values.service.apiPort }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "tsigma.selectorLabels" . | nindent 4 }}
{{- if .Values.grpcIngestion.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "tsigma.fullname" . }}-grpc
  labels:
    {{- include "tsigma.labels" . | nindent 4 }}
    app.kubernetes.io/component: grpc-ingestion
spec:
  type: {{ .Values.grpcIngestion.service.type }}
  ports:
    - name: grpc
      port: {{ .Values.grpcIngestion.service.port }}
      targetPort: grpc
      protocol: TCP
      appProtocol: grpc
  selector:
    {{- include "tsigma.selectorLabels" . | nindent 4 }}
{{- end }}
