{{- /*
Chart-managed secrets. Skipped if the user provides existingSecret refs in values.
Secrets are split: db (DB password) and auth (admin / OIDC / OAuth2 client secret).
*/ -}}

{{- if not .Values.database.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "tsigma.dbSecretName" . }}
  labels:
    {{- include "tsigma.labels" . | nindent 4 }}
type: Opaque
stringData:
  TSIGMA_PG_PASSWORD: {{ required "database.password (or database.existingSecret) is required" .Values.database.password | quote }}
{{- end }}

---
{{- $needsAuth := false -}}
{{- if and (eq .Values.auth.mode "local") (not .Values.auth.local.existingSecret) -}}
{{- $needsAuth = true -}}
{{- end -}}
{{- if and (eq .Values.auth.mode "oidc") (not .Values.auth.oidc.existingSecret) -}}
{{- $needsAuth = true -}}
{{- end -}}
{{- if and (eq .Values.auth.mode "oauth2") (not .Values.auth.oauth2.existingSecret) -}}
{{- $needsAuth = true -}}
{{- end -}}

{{- if $needsAuth }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "tsigma.authSecretName" . }}
  labels:
    {{- include "tsigma.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if eq .Values.auth.mode "local" }}
  TSIGMA_AUTH_ADMIN_PASSWORD: {{ required "auth.local.adminPassword (or auth.local.existingSecret) is required" .Values.auth.local.adminPassword | quote }}
  {{- end }}
  {{- if eq .Values.auth.mode "oidc" }}
  TSIGMA_OIDC_CLIENT_SECRET: {{ required "auth.oidc.clientSecret (or auth.oidc.existingSecret) is required" .Values.auth.oidc.clientSecret | quote }}
  {{- end }}
  {{- if eq .Values.auth.mode "oauth2" }}
  TSIGMA_OAUTH2_CLIENT_SECRET: {{ required "auth.oauth2.clientSecret (or auth.oauth2.existingSecret) is required" .Values.auth.oauth2.clientSecret | quote }}
  {{- end }}
{{- end }}
