[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --strict-markers
    --tb=short
    --cov=tsigma
    --cov-report=term-missing
    --cov-report=html
markers =
    integration: requires a running DB — each integration test is parameterised per dialect and will (a) use TSIGMA_TEST_{PG,MSSQL,ORACLE,MYSQL}_URL when set, (b) fall back to a Docker container via testcontainers when the env var is unset and Docker is available, or (c) skip that dialect otherwise.  TSIGMA_TEST_DB_URL is still honoured as an alias for TSIGMA_TEST_PG_URL.
