[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --strict-markers
    --tb=short
    --cov=tsigma
    --cov-report=term-missing
    --cov-report=html
markers =
    integration: requires a running PostgreSQL database (set TSIGMA_TEST_DB_URL)
